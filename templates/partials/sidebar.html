{{define "sidebar"}}
<nav class="sidebar" id="sidebar">
  {{range .Site.Nav}}
  <div class="nav-section">
    {{if .Label}}<div class="nav-section-label">{{.Label}}</div>{{end}}
    {{range .Items}}
    <a href="{{.Path}}" class="nav-item{{if eq .Path $.Page.Path}} active{{end}}">{{.Title}}</a>
    {{end}}
  </div>
  {{end}}
</nav>
{{end}}
