{{/* partials/pager.html — Phase 4: replace with full pager cards from _dev/docs-ui.html */}}
{{define "pager"}}
<nav class="pager">
  {{if .Page.Prev}}
  <a class="pager-prev" href="{{.Page.Prev.Path}}">← {{.Page.Prev.Title}}</a>
  {{end}}
  {{if .Page.Next}}
  <a class="pager-next" href="{{.Page.Next.Path}}">{{.Page.Next.Title}} →</a>
  {{end}}
</nav>
{{end}}
