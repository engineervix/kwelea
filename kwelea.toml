# kwelea.toml — configuration for kwelea's own documentation site

[site]
title    = "kwelea"
version  = "v0.1.0"
base_url = "https://engineervix.github.io/kwelea"
repo     = "https://github.com/engineervix/kwelea"

[build]
docs_dir   = "docs"
output_dir = "site"

[serve]
port         = 4000
open_browser = true

[theme]
light_code_theme = "github"
dark_code_theme  = "github-dark"

[[nav]]
section = "Introduction"
pages   = ["index.md", "01-getting-started.md", "02-installation.md"]

[[nav]]
section = "Guide"
pages   = [
  "guide/index.md",
  "guide/01-configuration.md",
  "guide/02-navigation.md",
  "guide/03-markdown.md",
  "guide/04-deployment.md",
]
